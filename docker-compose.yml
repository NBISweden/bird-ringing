name: bird-ringing

services:

  database-init:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ringdb
      POSTGRES_PASSWORD_FILE: /run/secrets/db-admin-pass
      DB_USER_PASSWORD_FILE: /run/secrets/db-user-pass
    volumes:
      - database-vol:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    secrets:
      - db-admin-pass
      - db-user-pass
    command: ["docker-ensure-initdb.sh"]
    restart: "no"

  database:
    image: postgres:18-alpine
    volumes:
      - database-vol:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      database-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - frontend-vol:/vol
    depends_on:
      database:
        condition: service_healthy

  proxy:
    image: caddy:2-alpine
    ports:
      - 127.0.0.1:3210:80
    volumes:
      - ./caddy:/etc/caddy:ro
      - frontend-vol:/vol:ro
      - proxy-vol:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://proxy/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      frontend:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      target: prod
    container_name: backend
    environment:
      POSTGRES_DB: ringdb
      POSTGRES_PASSWORD_FILE: /run/secrets/db-admin-pass
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 8080:8000
    secrets:
      - db-admin-pass
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://backend:8000/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  database-vol:
  frontend-vol:
  proxy-vol:

secrets:
  db-admin-pass:
    file: ./secrets/db-admin-pass.txt
  db-user-pass:
    file: ./secrets/db-user-pass.txt
