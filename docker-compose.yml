name: bird-ringing

services:

  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db-root-pass
      DB_ENV_FILE: /run/secrets/db-env
    volumes:
      - database-vol:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    secrets:
      - db-root-pass
      - db-env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  database-vol:

secrets:
  db-root-pass:
    file: ./secrets/db-root-pass.txt
  db-env:
    file: ./secrets/database.env
