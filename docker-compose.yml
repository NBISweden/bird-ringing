name: bird-ringing

services:

  database-init:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ringdb
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-pass
      DB_ADMIN_PASSWORD_FILE: /run/secrets/db-admin-pass
      DB_USER_PASSWORD_FILE: /run/secrets/db-user-pass
    volumes:
      - database-vol:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    secrets:
      - postgres-pass
      - db-admin-pass
      - db-user-pass
    command: ["docker-ensure-initdb.sh"]
    restart: "no"

  database:
    image: postgres:18-alpine
    volumes:
      - database-vol:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      database-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: prod
      args:
        BUILD_ID: "${BUILD_ID:-6000:6000}"
        RUNTIME_ID: "${RUNTIME_ID:-6001:6001}"
        BUILD_GIT_COMMIT: "${BUILD_GIT_COMMIT:-}"
        BUILD_GIT_BRANCH: "${BUILD_GIT_BRANCH:-}"
    volumes:
      - frontend-vol:/vol:ro
    depends_on:
      database:
        condition: service_healthy

  backend-init:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: prod
      args:
        BUILD_ID: "${BUILD_ID:-6000:6000}"
        RUNTIME_ID: "${RUNTIME_ID:-6001:6001}"
    environment:
      POSTGRES_USER: db_admin
      SERVICE_MODE: production-init
      POSTGRES_PASSWORD_FILE: /run/secrets/db-admin-pass
      DJANGO_SECRET_FILE: /run/secrets/django-secret-key
    depends_on:
      database:
        condition: service_healthy
    secrets:
      - db-admin-pass
      - django-secret-key

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: prod
      args:
        BUILD_ID: "${BUILD_ID:-6000:6000}"
        RUNTIME_ID: "${RUNTIME_ID:-6001:6001}"
    environment:
      POSTGRES_USER: db_user
      SERVICE_MODE: production
      POSTGRES_PASSWORD_FILE: /run/secrets/db-user-pass
      DJANGO_SECRET_FILE: /run/secrets/django-secret-key
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      LICENSE_CARD_FILE: ${LICENSE_CARD_FILE:-}
      PERMIT_TEMPLATE_FILE: ${PERMIT_TEMPLATE_FILE:-}
      DOCX2PDF_URL: http://docx2pdf:8000/convert/docx-to-pdf
      DJANGO_EMAIL_HOST_PASSWORD_FILE: /run/secrets/django-email-password
    volumes:
      - backend-vol:/vol:ro
      - ./resources:/resources:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://backend:8000/api/system/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend-init:
        condition: service_completed_successfully
      docx2pdf:
        condition: service_healthy
    secrets:
      - db-user-pass
      - django-secret-key
      - django-email-password

  docx2pdf:
    build:
      context: ./docx2pdf
      dockerfile: ../Dockerfile.docx2pdf
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://docx2pdf:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    ports:
      - 127.0.0.1:3210:80
    volumes:
      - ./caddy:/etc/caddy:ro
      - frontend-vol:/srv/frontend:ro
      - backend-vol:/srv/backend:ro
      - proxy-vol:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://proxy/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  database-vol:
  frontend-vol:
  backend-vol:
  proxy-vol:

secrets:
  postgres-pass:
    file: ./secrets/postgres-pass.txt
  db-admin-pass:
    file: ./secrets/db-admin-pass.txt
  db-user-pass:
    file: ./secrets/db-user-pass.txt
  django-secret-key:
    file: ./secrets/django-secret-key.txt
  django-email-password:
    file: ./secrets/django-email-password.txt
