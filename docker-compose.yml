name: bird-ringing

services:
  database-init:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ringdb
      POSTGRES_PASSWORD_FILE: /run/secrets/db-admin-pass
      DB_USER_PASSWORD_FILE: /run/secrets/db-user-pass
    volumes:
      - database-vol:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    secrets:
      - db-admin-pass
      - db-user-pass
    command: ["docker-ensure-initdb.sh"]
    restart: "no"

  database:
    image: postgres:18-alpine
    volumes:
      - database-vol:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      database-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    command: npm run start
    ports:
      - "3210:3000"
    working_dir: /app
    volumes:
      - ./frontend:/app # bind-mount source code
      - /app/node_modules # separate volume for node_modules inside the container

volumes:
  database-vol:

secrets:
  db-admin-pass:
    file: ./secrets/db-admin-pass.txt
  db-user-pass:
    file: ./secrets/db-user-pass.txt
