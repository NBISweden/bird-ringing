name: Bird ringing Backend Tests

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Testing  bird ringing backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            cairosvg \
            "django>=5.2.7" \
            "djangorestframework>=3.16.1" \
            "docxcompose>=2.0.0" \
            "docxtpl>=0.20.2" \
            "gunicorn>=23.0.0" \
            "psycopg[c]>=3.2.11"

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: test-secret-key
        run: |
          python manage.py test licensing.tests